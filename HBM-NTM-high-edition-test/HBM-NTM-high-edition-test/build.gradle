buildscript {
    repositories {
        // These repositories are only for Gradle plugins, put any other repositories in the repository block further below
        maven { url = 'https://repo.spongepowered.org/repository/maven-public/' }
        maven { url = 'https://maven.blamejared.com' }
        mavenCentral()
        maven { url = 'https://maven.minecraftforge.net/' }
    }
    dependencies {
        classpath 'org.spongepowered:mixingradle:0.7-SNAPSHOT'
    }
}

plugins {
    id 'idea'
    id 'net.minecraftforge.gradle' version '6.0.25'
    id 'org.parchmentmc.librarian.forgegradle' version '1.+'
//    id 'org.parchmentmc.librarian.forgegradle' version '1.2.0'
}

apply plugin: 'org.spongepowered.mixin'

def buildNumberTaskNames = ['compilejava', 'build', 'rundata', 'runclient'] as Set
def requestedTaskNames = gradle.startParameter.taskNames.collect { it.tokenize(':').last().toLowerCase(java.util.Locale.ROOT) }
def shouldBumpBuildNumber = requestedTaskNames.any { it in buildNumberTaskNames }

if (shouldBumpBuildNumber) {
    def propsFile = file('gradle.properties')
    def lines = propsFile.exists() ? propsFile.getText('UTF-8').readLines() : []

    def getProp = { String key ->
        for (String line : lines) {
            def trimmed = line.trim()
            if (trimmed.isEmpty() || trimmed.startsWith('#') || trimmed.startsWith('!')) {
                continue
            }
            def idx = line.indexOf('=')
            if (idx < 0) {
                continue
            }
            def k = line.substring(0, idx).trim()
            if (k == key) {
                return line.substring(idx + 1).trim()
            }
        }
        return null
    }

    def setProp = { String key, String value ->
        for (int i = 0; i < lines.size(); i++) {
            def line = lines[i]
            def trimmed = line.trim()
            if (trimmed.startsWith('#') || trimmed.startsWith('!')) {
                continue
            }
            def idx = line.indexOf('=')
            if (idx < 0) {
                continue
            }
            def k = line.substring(0, idx).trim()
            if (k == key) {
                lines[i] = "${k}=${value}"
                return true
            }
        }
        lines.add("${key}=${value}")
        return false
    }

    def rawVersion = getProp('mod_version') ?: (project.findProperty('mod_version') as String)
    if (rawVersion) {
        def matcher = rawVersion =~ /(.*)-Build(\d+)$/
        def base = rawVersion
        Integer buildNumber = null
        if (matcher.matches()) {
            base = matcher.group(1)
            buildNumber = matcher.group(2) as Integer
        }

        def lastBase = getProp('mod_version_base')
        def resetBuild = lastBase != null && lastBase != base
        def nextBuildNumber = resetBuild || buildNumber == null ? 1000 : buildNumber + 1
        def newVersion = "${base}-Build${nextBuildNumber}"

        setProp('mod_version', newVersion)
        setProp('mod_version_base', base)

        def newText = lines.join(System.lineSeparator()) + System.lineSeparator()
        if (propsFile.exists()) {
            if (propsFile.getText('UTF-8') != newText) {
                propsFile.setText(newText, 'UTF-8')
            }
        } else {
            propsFile.setText(newText, 'UTF-8')
        }

        project.ext.set('mod_version', newVersion)
    } else {
        logger.warn('mod_version not found in gradle.properties; build number bump skipped.')
    }
}

group = mod_group_id
version = mod_version

base {
    archivesName = mod_id
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(17)
}

minecraft {
    mappings channel: mapping_channel, version: mapping_version

    // When true, this property will have all Eclipse/IntelliJ IDEA run configurations run the "prepareX" task for the given run configuration before launching the game.
    // In most cases, it is not necessary to enable.
     enableEclipsePrepareRuns = false
     enableIdeaPrepareRuns = false

    // This property allows configuring Gradle's ProcessResources task(s) to run on IDE output locations before launching the game.
    // It is REQUIRED to be set to true for this template to function.
    // See https://docs.gradle.org/current/dsl/org.gradle.language.jvm.tasks.ProcessResources.html
    copyIdeResources = true

    // When true, this property will add the folder name of all declared run configurations to generated IDE run configurations.
    // The folder name can be set on a run configuration using the "folderName" property.
    // By default, the folder name of a run configuration is the name of the Gradle project containing it.
     generateRunFolders = false

     accessTransformer = file('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        // applies to all the run configs below
        configureEach {
            workingDirectory project.file('run')
            jvmArgs "-Xms2G", "-Xmx8G"
            jvmArgs "-Djava.io.tmpdir=${projectDir}/run/tmp_secure"
            if (org.gradle.internal.os.OperatingSystem.current().isMacOsX()) {
                jvmArgs "-XstartOnFirstThread"
            }

            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            property 'forge.logging.markers', 'REGISTRIES'


            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            property 'forge.logging.console.level', 'debug'

            mods {
                "${mod_id}" {
                    source sourceSets.main
                }
            }
        }

        client {
            // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
            property 'forge.enabledGameTestNamespaces', mod_id
        }

        server {
            property 'forge.enabledGameTestNamespaces', mod_id
            args '--nogui'
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            property 'forge.enabledGameTestNamespaces', mod_id
        }

        data {
            // example of overriding the workingDirectory set in configureEach above
            workingDirectory project.file('run-data')

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            args '--mod', mod_id, '--client', '--server', '--output', file('src/generated/resources/'), '--existing', file('src/main/resources/')
        }
    }
}

// Include resources generated by data generators.
sourceSets.main.resources { srcDir 'src/generated/resources' }

mixin {
    add sourceSets.main, "${mod_id}.refmap.json"
    config "${mod_id}.mixins.json"
}

repositories {
    // If you have mod jar dependencies in ./libs, you can declare them as a repository like so.
    // See https://docs.gradle.org/current/userguide/declaring_repositories.html#sub:flat_dir_resolver
     flatDir {
         dir 'libs'
     }
    maven { url = 'https://dl.cloudsmith.io/public/geckolib3/geckolib/maven/' }
    maven {
        // location of the maven that hosts JEI files before January 2023
        name = "Progwml6's maven"
        url = "https://dvs1.progwml6.com/files/maven/"
    }
    maven {
        name = "Jared's maven" // JEI 的 Maven 仓库
        url = "https://maven.blamejared.com/"
    }
    maven {
        // location of a maven mirror for JEI files, as a fallback
        name = "ModMaven"
        url = "https://modmaven.dev"
    }
    mavenCentral()
}

def commonsIoSafeVersion = '2.16.1'
def commonsCompressSafeVersion = '1.26.0'
def commonsLangSafeVersion = '3.14.0'
def nettySafeVersion = '4.1.108.Final'

dependencies {
    // Specify the version of Minecraft to use.
    // Any artifact can be supplied so long as it has a "userdev" classifier artifact and is a compatible patcher artifact.
    // The "userdev" classifier will be requested and setup by ForgeGradle.
    // If the group id is "net.minecraft" and the artifact id is one of ["client", "server", "joined"],
    // then special handling is done to allow a setup of a vanilla dependency without the use of an external repository.
    minecraft "net.minecraftforge:forge:${mc_version}-${forge_version}"

    // Example mod dependency with JEI - using fg.deobf() ensures the dependency is remapped to your development mappings
    // JEI依赖
     compileOnly fg.deobf("mezz.jei:jei-${mc_version}-common-api:${jei_version}")
     compileOnly fg.deobf("mezz.jei:jei-${mc_version}-forge-api:${jei_version}")
     runtimeOnly fg.deobf("mezz.jei:jei-${mc_version}-forge:${jei_version}")
    implementation fg.deobf("software.bernie.geckolib:geckolib-forge-1.20.1:4.4")
    implementation fg.deobf('com.github.glitchfiend:TerraBlender-forge:1.20.1-3.0.1.7')

    // ===== 安全修复：对齐到修复后的 Guava 版本，修复 CVE-2023-2976（仅编译期，不会打进最终JAR） =====
    compileOnly("com.google.guava:guava:33.4.8-jre")

    constraints {
        implementation("com.google.guava:guava:33.4.8-jre") {
            because("Fix CVE-2023-2976 in Guava (use >=32.0.1).")
        }
        runtimeOnly("com.google.guava:guava:33.4.8-jre") {
            because("对开发运行时的传递依赖进行版本对齐；发布的mod不会包含Guava。")
        }
        implementation("commons-io:commons-io:${commonsIoSafeVersion}") {
            because("Fix CVE-2024-47554 (resource exhaustion) flagged in Mend scan.")
        }
        runtimeOnly("commons-io:commons-io:${commonsIoSafeVersion}") {
            because("确保运行时传递依赖也使用修复后的 commons-io 版本。")
        }
        implementation("org.apache.commons:commons-compress:${commonsCompressSafeVersion}") {
            because("Fix CVE-2024-25710 / CVE-2024-26308 in commons-compress.")
        }
        runtimeOnly("org.apache.commons:commons-compress:${commonsCompressSafeVersion}") {
            because("确保运行时传递依赖也使用修复后的 commons-compress 版本。")
        }
        implementation("org.apache.commons:commons-lang3:${commonsLangSafeVersion}") {
            because("Fix CVE-2025-48924 in commons-lang3.")
        }
        runtimeOnly("org.apache.commons:commons-lang3:${commonsLangSafeVersion}") {
            because("确保运行时传递依赖也使用修复后的 commons-lang3 版本。")
        }
        implementation("io.netty:netty-common:${nettySafeVersion}") {
            because("Fix CVE-2024-47535 / CVE-2025-25193 in Netty core modules.")
        }
        runtimeOnly("io.netty:netty-common:${nettySafeVersion}") {
            because("确保运行时传递依赖也使用修复后的 Netty core 版本。")
        }
        implementation("io.netty:netty-handler:${nettySafeVersion}") {
            because("Fix CVE-2023-34462 in Netty handler.")
        }
        runtimeOnly("io.netty:netty-handler:${nettySafeVersion}") {
            because("确保运行时传递依赖也使用修复后的 Netty handler 版本。")
        }
    }

    // Example mod dependency using a mod jar from ./libs with a flat dir repository
    // This maps to ./libs/coolmod-${mc_version}-${coolmod_version}.jar
    // The group id is ignored when searching -- in this case, it is "blank"
    // implementation fg.deobf("blank:coolmod-${mc_version}:${coolmod_version}")

    // For more info:
    // http://www.gradle.org/docs/current/userguide/artifact_dependencies_tutorial.html
    // http://www.gradle.org/docs/current/userguide/dependency_management.html

    annotationProcessor project(':processor')
    compileOnly project(':processor')
    annotationProcessor 'org.spongepowered:mixin:0.8.5:processor'
    implementation 'junit:junit:4.13.2'
}

configurations.configureEach {
    resolutionStrategy.eachDependency { details ->
        if (details.requested.group == 'io.netty' && details.requested.version != nettySafeVersion) {
            details.useVersion(nettySafeVersion)
            details.because('Align all Netty modules with CVE-fixed version.')
        } else if  (details.requested.group == 'commons-io' && details.requested.name == 'commons-io' && details.requested.version != commonsIoSafeVersion) {
            details.useVersion(commonsIoSafeVersion)
            details.because('Force Mend-recommended commons-io version to fix CVE-2024-47554.')
        } else if (details.requested.group == 'org.apache.commons' && details.requested.name == 'commons-compress' && details.requested.version != commonsCompressSafeVersion) {
            details.useVersion(commonsCompressSafeVersion)
            details.because('Force patched commons-compress for CVE-2024-25710 / CVE-2024-26308.')
        } else if (details.requested.group == 'org.apache.commons' && details.requested.name == 'commons-lang3' && details.requested.version != commonsLangSafeVersion) {
            details.useVersion(commonsLangSafeVersion)
            details.because('Force patched commons-lang3 for CVE-2025-48924.')
        }
    }
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
// When "copyIdeResources" is enabled, this will also run before the game launches in IDE environments.
// See https://docs.gradle.org/current/dsl/org.gradle.language.jvm.tasks.ProcessResources.html
tasks.named('processResources', ProcessResources).configure {
    def replaceProperties = [
            minecraft_version: mc_version, minecraft_version_range: minecraft_version_range,
            forge_version: forge_version, forge_version_range: forge_version_range,
            loader_version_range: loader_version_range,
            mod_id: mod_id, mod_name: mod_name, mod_license: mod_license, mod_version: mod_version,
            mod_authors: mod_authors, mod_description: mod_description,
    ]

    inputs.properties replaceProperties

    filesMatching(['META-INF/mods.toml', 'pack.mcmeta']) {
        expand replaceProperties + [project: project]
    }

    // Include data generated by DatapackBuiltinEntriesProvider (configured/placed features, tags, etc.)
    // but exclude any generated assets to avoid duplicate resource entries (e.g., item models).
    from('src/generated/resources') {
        include 'data/**'
    }

    // If a resource exists in both main and generated, prefer the one from main.
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

// Example for how to get properties into the manifest for reading at runtime.
tasks.named('jar', Jar).configure {
    manifest {
        attributes([
                "Specification-Title": mod_id,
                "Specification-Vendor": mod_authors,
                "Specification-Version": "1", // We are version 1 of ourselves
                "Implementation-Title": project.name,
                "Implementation-Version": project.jar.archiveVersion,
                "Implementation-Vendor": mod_authors,
                "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
        ])
    }

    // This is the preferred method to reobfuscate your jar file
    finalizedBy 'reobfJar'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

tasks.named('compileJava', JavaCompile).configure {
    options.incremental = true
    options.compilerArgs.add('-Xplugin:suppress-checked-exceptions')
    options.fork = true
    options.forkOptions.jvmArgs.addAll([
            '--add-exports=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED',
            '--add-exports=jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED',
            '--add-exports=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED',
            '--add-exports=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED',
            '--add-opens=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED',
            '--add-opens=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED',
    ])
}

tasks.named('compileTestJava', JavaCompile).configure {
    options.incremental = true
}

// 确保受控临时目录存在，避免回退到共享 tmp 目录
tasks.withType(JavaExec).configureEach {
    doFirst { file("${projectDir}/run/tmp_secure").mkdirs() }
}
